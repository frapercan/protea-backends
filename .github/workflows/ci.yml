name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install poetry
        run: pipx install poetry
      - name: Install dependencies
        run: poetry install --with dev
      - name: Lint (ruff)
        run: poetry run ruff check .
      - name: Smell budget (master plan v3.2 §3)
        run: poetry run python scripts/check_smells.py --target src
      - name: Type-check (mypy strict)
        run: poetry run mypy src tests
      - name: Test
        # Coverage gate at 15 percent during F2A: each backend body
        # adds ~50 lazy-imported lines (torch/transformers) that
        # protea-core integration-tests, not this lightweight CI.
        # The threshold drops as more backends land. F2A.5 brings the
        # `protea-backends[esm|t5|ankh|esm3c]` extras into CI and the
        # gate jumps back to 70 percent.
        run: poetry run pytest --cov=protea_backends --cov-report=term --cov-fail-under=15
